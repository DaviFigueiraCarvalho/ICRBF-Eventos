<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICR - Conferência de Casais</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <img src="banner.jpeg" alt="Banner do evento" class="logo-img">
        <h2>Conferência de Casais</h2>
        <p class="subtitle">Inscrição para a Conferência de Casais de 18/04/2026 da Icr Baixada Fluminense</p>
    <form id="inscricaoForm">
        <div class="form-group">
            <label><span class="material-icons">man</span> Nome do Homem</label>
            <input type="text" id="homem" required placeholder="Nome completo">
        </div>

        <div class="form-group">
            <label><span class="material-icons">woman</span> Nome da Mulher</label>
            <input type="text" id="mulher" required placeholder="Nome completo">
        </div>
        <div class="form-group">
            <label><span class="material-icons">call</span> Telefone</label>

            <input type="tel" id="telefone" required placeholder="21999999999"pattern="^\d{10,11}$" maxlength="11"
            >

        </div>
        <div class="form-group">
            <label><span class="material-icons">church</span> Igreja</label>
            <select id="igreja" required>
                <option value="">Selecione sua igreja...</option>
                <option value="Baixada Fluminense - (Vila Rosali)">Baixada Fluminense - (Vila Rosali)</option>
                <option value="Angra dos Reis">Angra dos Reis</option>
                <option value="Campo Grande">Campo Grande</option>
                <option value="Iguaba Grande">Iguaba Grande</option>
                <option value="Região dos Lagos">Região dos Lagos</option>
            </select>
        </div>

        <div id="celulaWrapper" class="form-group hidden">
            <label><span class="material-icons">groups</span> Célula</label>
            <select id="celula">
                <option value="Matriz(Baixada Fluminense - Vila Rosali)">Matriz(Baixada Fluminense - Vila Rosali)</option>
                <option value="300">300</option>
                <option value="Queimados-Nova Iguaçu">Queimados-Nova Iguaçu</option>
                <option value="Rio-Mesquita">Rio-Mesquita</option>
                <option value="Caxias">Caxias</option>
            </select>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">
            <span class="material-icons">done_all</span> Confirmar Inscrição
        </button>
    </form>

    
</div>
<div id="successArea" class="success-area hidden">
    <span class="material-icons check-icon">check_circle</span>
    <h3>Inscrição Realizada!</h3>
    
    <div class="pix-container">
        <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="100" height="100" viewBox="0 0 48 48">
        <path fill="#4db6ac" d="M11.9,12h-0.68l8.04-8.04c2.62-2.61,6.86-2.61,9.48,0L36.78,12H36.1c-1.6,0-3.11,0.62-4.24,1.76	l-6.8,6.77c-0.59,0.59-1.53,0.59-2.12,0l-6.8-6.77C15.01,12.62,13.5,12,11.9,12z"></path><path fill="#4db6ac" d="M36.1,36h0.68l-8.04,8.04c-2.62,2.61-6.86,2.61-9.48,0L11.22,36h0.68c1.6,0,3.11-0.62,4.24-1.76	l6.8-6.77c0.59-0.59,1.53-0.59,2.12,0l6.8,6.77C32.99,35.38,34.5,36,36.1,36z"></path><path fill="#4db6ac" d="M44.04,28.74L38.78,34H36.1c-1.07,0-2.07-0.42-2.83-1.17l-6.8-6.78c-1.36-1.36-3.58-1.36-4.94,0	l-6.8,6.78C13.97,33.58,12.97,34,11.9,34H9.22l-5.26-5.26c-2.61-2.62-2.61-6.86,0-9.48L9.22,14h2.68c1.07,0,2.07,0.42,2.83,1.17	l6.8,6.78c0.68,0.68,1.58,1.02,2.47,1.02s1.79-0.34,2.47-1.02l6.8-6.78C34.03,14.42,35.03,14,36.1,14h2.68l5.26,5.26	C46.65,21.88,46.65,26.12,44.04,28.74z"></path>
        </svg>        
        <div class="pix-details">
            <p><strong>Chave Pix:</strong><br>familiasforteicrbf@gmail.com</p>
            <p><strong>Valor:</strong> R$ 20,00 por casal</p>
            <p><strong>Data Limite:</strong> Até 10/04</p>
        </div>
    </div>

    <p class="whatsapp-instruction">Para concluir, entre no grupo oficial:</p>
    <a href="#" id="whatsappBtn" target="_blank" class="btn-whatsapp">
        <span class="material-icons">chat</span> Entrar no WhatsApp
    </a>
</div>
<script src="script.js"></script>
</body>
</html>
